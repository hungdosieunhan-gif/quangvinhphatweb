name: Deploy Bakery ERP to GitHub Pages (gh-pages)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: bakery-erp-dashboard-runner

      - name: Build
        run: npm run build
        working-directory: bakery-erp-dashboard-runner

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          publish_dir: bakery-erp-dashboard-runner/dist
          github_token: ${{ secrets.GITHUB_TOKEN }}

